# ============================================================
# Application Configuration
# ============================================================

# Base URL of the Application Under Test
base.url=https://gon-demo.pirago.work

# Login Page URL
login.url=https://gon-demo.pirago.work/login

# ─── Browser Settings ───
# Supported values: chrome | firefox | edge
browser=chrome

# Run browser in headless mode (true for CI/CD environments)
headless=false

# ─── Timeout Settings (in seconds) ───
# Explicit wait timeout used by WaitUtils
explicit.wait.timeout=15

# Page load timeout
page.load.timeout=30

# Implicit wait (set to 0 to rely entirely on Explicit Waits)
implicit.wait.timeout=0

# ─── Test Credentials ───
# Default valid credentials for smoke/regression tests
valid.username=NV2
valid.password=12345678@Hn
